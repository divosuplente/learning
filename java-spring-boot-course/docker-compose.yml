# docker-compose.yml for a minimal local Kafka cluster used in Module 06
# This file creates a Zookeeper node (required for KTables, Flink, etc.) and a single broker.
# Port 2181 is for Zookeeper, port 9092 for the broker.  These ports are exposed locally.
version: "3.9"
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_KEEPALIVE: "60"
      ZOO_MAX_CLIENTS: "300"
  kafka-broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-broker:9092,PLAINTEXT://kafka-broker:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_POOLED_CONNECTIONS: "UNSPECIFIED"
      KAFKA_TRANSACTION_STATE_LOG_MAX_MILLISECONDS: "5000"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

# To start the cluster run:
#   docker-compose up -d
# Then wait a few seconds before the Java application starts.

# Stop the cluster with:
#   docker-compose down